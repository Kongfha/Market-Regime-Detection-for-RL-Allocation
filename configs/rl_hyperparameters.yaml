# Centralized hyperparameters for the Attention_DQN_Training notebook.
# Edit values here and load them from Python with ml.hyperparameter_config.

general:
  fast_mode: false
  sequence_length: 4

environment:
  transaction_cost: 0.001
  volatility_penalty: 0.05
  lookback_vol: 4

dqn:
  learning_rate: 1.0e-4
  buffer_size:
    fast: 100000
    full: 250000
  learning_starts:
    fast: 2000
    full: 5000
  batch_size:
    fast: 128
    full: 256
  gamma: 0.99
  target_update_interval:
    fast: 1000
    full: 2000
  exploration_fraction: 0.15
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.05
  train_timesteps:
    fast: 1000000
    full: 1000000
  eval_freq:
    fast: 2000
    full: 5000
  early_stopping_patience:
    fast: 1000000
    full: 1000000

a2c:
  learning_rate: 5.0e-4
  gamma: 0.99
  n_steps:
    fast: 128
    full: 256
  ent_coef: 0.01
  vf_coef: 0.5
  batch_size:
    fast: 128
    full: 256
  train_timesteps:
    fast: 1000000
    full: 1000000

ppo:
  learning_rate: 3.0e-4
  n_steps:
    fast: 512
    full: 2048
  batch_size:
    fast: 256
    full: 512
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  train_timesteps:
    fast: 1000000
    full: 1000000
  diagnostics_steps:
    fast: 120
    full: 300

ppo_native_attention:
  features_dim: 128
  net_arch:
    pi: [128, 64]
    vf: [128, 64]
  learning_rate: 2.0e-4
  n_steps:
    fast: 512
    full: 2048
  batch_size:
    fast: 256
    full: 512
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  train_timesteps:
    fast: 1000000
    full: 1000000
  diagnostics_steps:
    fast: 120
    full: 300

hpo:
  train_timesteps:
    fast: 1000000
    full: 1000000
  selected_trials:
    - learning_rate: 1.0e-4
      ent_coef: 0.005
      n_steps: 256
      clip_range: 0.2
    - learning_rate: 3.0e-4
      ent_coef: 0.005
      n_steps: 256
      clip_range: 0.2
    - learning_rate: 7.0e-4
      ent_coef: 0.0
      n_steps: 256
      clip_range: 0.15
